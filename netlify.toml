[build]
  command = "npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**", "shared/**"]

[dev]
  command = "npm run dev"
  targetPort = 5173

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "*"

[[redirects]]
  from = "/manifest.json"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/stash/configure"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*/manifest.json"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*/catalog/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*/meta/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*/stream/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/catalog/*"
  to = "/.netlify/functions/api"
  status = 200

